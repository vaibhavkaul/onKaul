services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8000}"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - redis

  bee-worker:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
    command: ["python", "-m", "bee.worker"]
    depends_on:
      - redis
