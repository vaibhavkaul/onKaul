<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>onKaul</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .prose pre { background:#1e1e2e; color:#cdd6f4; border-radius:.5rem; padding:1rem; overflow-x:auto; margin:.75rem 0; font-size:.85em; }
    .prose code:not(pre code) { background:#e2e8f0; border-radius:.25rem; padding:.1em .35em; font-size:.875em; }
    .prose p { margin:.5rem 0; }
    .prose ul,.prose ol { margin:.5rem 0; padding-left:1.5rem; }
    .prose li { margin:.2rem 0; }
    .prose h1,.prose h2,.prose h3,.prose h4 { font-weight:600; margin:.75rem 0 .25rem; }
    .prose h1 { font-size:1.25em; } .prose h2 { font-size:1.1em; } .prose h3 { font-size:1em; }
    .prose blockquote { border-left:3px solid #94a3b8; padding-left:.75rem; color:#64748b; margin:.5rem 0; }
    .prose a { color:#3b82f6; text-decoration:underline; }
    .prose table { border-collapse:collapse; width:100%; margin:.5rem 0; }
    .prose th,.prose td { border:1px solid #e2e8f0; padding:.4rem .75rem; }
    .prose th { background:#f8fafc; font-weight:600; }

    .streaming-cursor::after { content:'▋'; animation:blink 1s step-start infinite; margin-left:1px; }
    @keyframes blink { 50% { opacity:0; } }

    #messages::-webkit-scrollbar { width:6px; }
    #messages::-webkit-scrollbar-track { background:transparent; }
    #messages::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }

    #sessionList::-webkit-scrollbar { width:4px; }
    #sessionList::-webkit-scrollbar-track { background:transparent; }
    #sessionList::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:2px; }

    .session-item.active { background:#eff6ff; }
    .session-item.active .session-title { color:#1d4ed8; }
  </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="w-60 bg-white border-r border-slate-200 flex flex-col flex-shrink-0">

    <!-- Logo -->
    <div class="px-4 py-4 border-b border-slate-100">
      <div class="flex items-center gap-2">
        <span class="font-bold text-slate-800 text-base">onKaul</span>
        <span class="text-xs text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded-full">AI</span>
      </div>
    </div>

    <!-- New conversation -->
    <div class="px-3 pt-3 pb-2">
      <button
        id="newChatBtn"
        class="w-full flex items-center gap-2 text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-3 py-2 rounded-lg transition-colors"
      >
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New conversation
      </button>
    </div>

    <!-- Session list -->
    <div id="sessionList" class="flex-1 overflow-y-auto px-2 pb-4 space-y-0.5">
      <!-- populated by JS -->
    </div>

  </aside>

  <!-- ── Main area ───────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Messages -->
    <main id="messages" class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-4">
      <div id="welcome" class="flex justify-center">
        <div class="max-w-xl text-center text-slate-400 mt-16">
          <div class="text-4xl mb-4">🤖</div>
          <p class="text-lg font-medium text-slate-600">Ask onKaul anything</p>
          <p class="text-sm mt-1">Investigate errors, search code, query Datadog, look up Jira issues, and more.</p>
        </div>
      </div>
    </main>

    <!-- Input bar -->
    <footer class="bg-white border-t border-slate-200 px-4 py-3">
      <form id="chatForm" class="max-w-3xl mx-auto flex gap-2 items-end">
        <textarea
          id="messageInput"
          rows="1"
          placeholder="Ask onKaul something…"
          class="flex-1 resize-none overflow-hidden rounded-xl border border-slate-300 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 transition-all"
          style="max-height:160px;"
        ></textarea>
        <button id="submitBtn" type="submit"
          class="bg-blue-500 hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl px-4 py-2.5 text-sm font-medium transition-colors flex-shrink-0">
          Send
        </button>
        <button id="stopBtn" type="button"
          class="hidden bg-slate-200 hover:bg-red-100 hover:text-red-600 hover:border-red-300 border border-slate-200 text-slate-600 rounded-xl px-4 py-2.5 text-sm font-medium transition-colors flex-shrink-0">
          Stop
        </button>
      </form>
    </footer>

  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    const SESSION_KEY = 'onkaul_session_id';
    let currentSessionId = localStorage.getItem(SESSION_KEY) || null;
    let isStreaming = false;
    let abortController = null;

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const messagesEl  = document.getElementById('messages');
    const sessionList = document.getElementById('sessionList');
    const form        = document.getElementById('chatForm');
    const input       = document.getElementById('messageInput');
    const submitBtn   = document.getElementById('submitBtn');
    const stopBtn     = document.getElementById('stopBtn');
    const newChatBtn  = document.getElementById('newChatBtn');

    // ─── Helpers ──────────────────────────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function relativeTime(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)  return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function setStreaming(on) {
      isStreaming = on;
      submitBtn.classList.toggle('hidden', on);
      stopBtn.classList.toggle('hidden', !on);
      input.disabled = on;
    }

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    }

    function showWelcome() {
      messagesEl.innerHTML = `
        <div id="welcome" class="flex justify-center">
          <div class="max-w-xl text-center text-slate-400 mt-16">
            <div class="text-4xl mb-4">🤖</div>
            <p class="text-lg font-medium text-slate-600">Ask onKaul anything</p>
            <p class="text-sm mt-1">Investigate errors, search code, query Datadog, look up Jira issues, and more.</p>
          </div>
        </div>`;
    }

    function hideWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    // ─── Session sidebar ──────────────────────────────────────────────────────
    async function loadSessions() {
      try {
        const res = await fetch('/web/sessions');
        if (!res.ok) return;
        renderSessionList(await res.json());
      } catch (_) {}
    }

    function renderSessionList(sessions) {
      if (!sessions.length) {
        sessionList.innerHTML = `<p class="text-xs text-slate-400 px-3 py-4 text-center">No conversations yet</p>`;
        return;
      }
      sessionList.innerHTML = sessions.map(s => `
        <div
          class="session-item ${s.session_id === currentSessionId ? 'active' : ''} flex items-start gap-2 px-3 py-2 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors"
          data-id="${escapeHtml(s.session_id)}"
        >
          <div class="flex-1 min-w-0">
            <p class="session-title text-xs font-medium text-slate-700 truncate">${escapeHtml(s.title)}</p>
            <p class="text-xs text-slate-400 mt-0.5">${relativeTime(s.updated_at)}</p>
          </div>
        </div>`).join('');

      sessionList.querySelectorAll('.session-item').forEach(el => {
        el.addEventListener('click', () => openSession(el.dataset.id));
      });
    }

    function markActiveSession(sessionId) {
      sessionList.querySelectorAll('.session-item').forEach(el => {
        const isActive = el.dataset.id === sessionId;
        el.classList.toggle('active', isActive);
        const title = el.querySelector('.session-title');
        if (title) {
          title.classList.toggle('text-blue-700', isActive);
          title.classList.toggle('text-slate-700', !isActive);
        }
      });
    }

    // ─── Load a past conversation ─────────────────────────────────────────────
    async function openSession(sessionId) {
      if (isStreaming || sessionId === currentSessionId) return;
      try {
        const res = await fetch(`/web/sessions/${sessionId}`);
        if (!res.ok) return;
        const session = await res.json();

        currentSessionId = sessionId;
        localStorage.setItem(SESSION_KEY, sessionId);
        markActiveSession(sessionId);

        messagesEl.innerHTML = '';
        for (const msg of session.messages) {
          if (msg.role === 'user') {
            appendUserMessage(msg.content);
          } else if (msg.role === 'assistant') {
            const bubble = appendAssistantMessage();
            bubble.classList.remove('streaming-cursor');
            bubble.innerHTML = marked.parse(msg.content || '');
          }
        }
        scrollToBottom();
      } catch (_) {}
    }

    // ─── Message rendering ────────────────────────────────────────────────────
    function appendUserMessage(text) {
      hideWelcome();
      const el = document.createElement('div');
      el.className = 'flex justify-end';
      el.innerHTML = `<div class="max-w-xl bg-blue-500 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm whitespace-pre-wrap">${escapeHtml(text)}</div>`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function appendAssistantMessage() {
      const wrapper = document.createElement('div');
      wrapper.className = 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = 'max-w-2xl bg-white border border-slate-200 rounded-2xl rounded-tl-sm px-4 py-3 text-sm text-slate-800 shadow-sm prose streaming-cursor';
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    function appendErrorMessage(text) {
      const el = document.createElement('div');
      el.className = 'flex justify-center';
      el.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-2.5 text-sm max-w-lg">⚠️ ${escapeHtml(text)}</div>`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    // ─── Stream a new message ─────────────────────────────────────────────────
    async function sendMessage(message) {
      setStreaming(true);
      appendUserMessage(message);

      const bubble = appendAssistantMessage();
      let rawText = '';
      let buffer  = '';

      abortController = new AbortController();

      try {
        const res = await fetch('/web/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: currentSessionId }),
          signal: abortController.signal,
        });

        if (!res.ok) throw new Error(`Server error ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const parts = buffer.split('\n\n');
          buffer = parts.pop();

          for (const part of parts) {
            for (const line of part.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              let event;
              try { event = JSON.parse(line.slice(6)); } catch { continue; }

              if (event.type === 'session') {
                currentSessionId = event.session_id;
                localStorage.setItem(SESSION_KEY, currentSessionId);

              } else if (event.type === 'text') {
                rawText += event.content;
                bubble.innerHTML = marked.parse(rawText);
                scrollToBottom();

              } else if (event.type === 'done') {
                bubble.classList.remove('streaming-cursor');
                loadSessions(); // refresh sidebar

              } else if (event.type === 'error') {
                bubble.remove();
                appendErrorMessage(event.content);
              }
            }
          }
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          bubble.classList.remove('streaming-cursor');
          if (!rawText) bubble.remove();
        } else {
          bubble.remove();
          appendErrorMessage(err.message || 'Connection failed');
        }
      } finally {
        abortController = null;
        bubble.classList.remove('streaming-cursor');
        setStreaming(false);
        input.focus();
      }
    }

    // ─── New conversation ─────────────────────────────────────────────────────
    function startNewConversation() {
      if (isStreaming) return;
      currentSessionId = null;
      localStorage.removeItem(SESSION_KEY);
      markActiveSession(null);
      showWelcome();
      input.focus();
    }

    // ─── Event listeners ──────────────────────────────────────────────────────
    form.addEventListener('submit', e => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message || isStreaming) return;
      input.value = '';
      autoResize();
      sendMessage(message);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.dispatchEvent(new Event('submit')); }
    });

    input.addEventListener('input', autoResize);
    stopBtn.addEventListener('click', () => { if (abortController) abortController.abort(); });
    newChatBtn.addEventListener('click', startNewConversation);

    // ─── Init ─────────────────────────────────────────────────────────────────
    (async function init() {
      await loadSessions();
      if (currentSessionId) await openSession(currentSessionId);
      input.focus();
    })();
  </script>
</body>
</html>
